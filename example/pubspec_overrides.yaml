# melos_managed_dependency_overrides: flutter_midi_command_android,flutter_midi_command_linux,flutter_midi_command_web,flutter_midi_command_windows
# Local development overrides: force the example app to build the in-repo
# package sources instead of the published pub.dev versions. Without this,
# `flutter_midi_command_darwin` (and the pigeon platform interface) resolve to
# pub.dev, so native/Swift edits in packages/ never reach the build.
dependency_overrides:
  flutter_midi_command:
    path: ../
  flutter_midi_command_darwin:
    path: ../packages/flutter_midi_command_darwin
  flutter_midi_command_ble:
    path: ../packages/flutter_midi_command_ble
  flutter_midi_command_platform_interface:
    path: ../packages/flutter_midi_command_platform_interface
  flutter_midi_command_android:
    path: ../packages/flutter_midi_command_android
  flutter_midi_command_linux:
    path: ../packages/flutter_midi_command_linux
  flutter_midi_command_web:
    path: ../packages/flutter_midi_command_web
  flutter_midi_command_windows:
    path: ../packages/flutter_midi_command_windows
