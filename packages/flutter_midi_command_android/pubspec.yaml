name: flutter_midi_command_android
description: The Android implementation of flutter_midi_command, bridging the platform MIDI APIs to send and receive MIDI messages.
version: 1.0.3
homepage: https://github.com/InvisibleWrench/FlutterMidiCommand
repository: https://github.com/InvisibleWrench/FlutterMidiCommand/tree/main/packages/flutter_midi_command_android
issue_tracker: https://github.com/InvisibleWrench/FlutterMidiCommand/issues
documentation: https://github.com/InvisibleWrench/FlutterMidiCommand/tree/main/packages/flutter_midi_command_android
topics:
  - midi
  - flutter-plugin
  - android
  - serial
  - usb

environment:
  sdk: ">=3.12.0 <4.0.0"
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_midi_command_platform_interface: ^1.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    implements: flutter_midi_command
    platforms:
      android:
        package: com.invisiblewrench.fluttermidicommand
        pluginClass: FlutterMidiCommandPlugin
