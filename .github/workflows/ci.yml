name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - codex/restructure-repo-into-mono-repo-with-melon

env:
  FLUTTER_VERSION: '3.44.2'
  MELOS_VERSION: '6.3.3'

jobs:
  pigeon_contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - name: Install Melos
        shell: bash
        run: |
          dart pub global activate melos ${{ env.MELOS_VERSION }}
          echo "$PUB_CACHE/bin" >> "$GITHUB_PATH"
      - run: melos bootstrap
      - run: dart run pigeon --input pigeons/midi_api.dart
      # The workspace format check normalizes generated Dart. Pigeon emits
      # functionally identical Dart with generator-specific whitespace, so
      # apply the same formatter before comparing checked-in contracts.
      - run: dart format packages/flutter_midi_command_platform_interface/lib/src/pigeon/midi_api.g.dart
      - run: git diff --exit-code -- packages/flutter_midi_command_platform_interface/lib/src/pigeon packages/flutter_midi_command_android/android/src/main/kotlin/com/invisiblewrench/fluttermidicommand/pigeon packages/flutter_midi_command_darwin/darwin/flutter_midi_command_darwin/Sources/flutter_midi_command_darwin/pigeon

  dart_checks:
    runs-on: ubuntu-latest
    needs: pigeon_contracts
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - name: Install Melos
        shell: bash
        run: |
          dart pub global activate melos ${{ env.MELOS_VERSION }}
          echo "$PUB_CACHE/bin" >> "$GITHUB_PATH"
      - run: melos bootstrap
      - run: melos run analyze
      - run: melos run analyze:example
      - run: melos run test
      - run: melos run test:web:chrome

  native_android_checks:
    runs-on: ubuntu-latest
    needs: pigeon_contracts
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - name: Install Melos
        shell: bash
        run: |
          dart pub global activate melos ${{ env.MELOS_VERSION }}
          echo "$PUB_CACHE/bin" >> "$GITHUB_PATH"
      - run: melos bootstrap
      - name: Android native unit tests
        run: melos run test:native:android

  native_darwin_checks:
    runs-on: macos-latest
    needs: pigeon_contracts
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - name: Install Melos
        shell: bash
        run: |
          dart pub global activate melos ${{ env.MELOS_VERSION }}
          echo "$PUB_CACHE/bin" >> "$GITHUB_PATH"
      - run: melos bootstrap
      - name: Darwin native tests
        run: melos run test:native:darwin

  native_linux_checks:
    runs-on: ubuntu-latest
    needs: pigeon_contracts
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - name: Install Melos
        shell: bash
        run: |
          dart pub global activate melos ${{ env.MELOS_VERSION }}
          echo "$PUB_CACHE/bin" >> "$GITHUB_PATH"
      - run: melos bootstrap
      - name: Linux backend tests
        run: melos run test:native:linux

  native_windows_checks:
    runs-on: windows-latest
    needs: pigeon_contracts
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - name: Install Melos
        shell: bash
        run: |
          dart pub global activate melos ${{ env.MELOS_VERSION }}
          echo "$PUB_CACHE/bin" >> "$GITHUB_PATH"
      - run: melos bootstrap
      - name: Windows backend tests
        run: melos run test:native:windows

  example_android:
    runs-on: ubuntu-latest
    needs: [dart_checks, native_android_checks]
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - name: Install Melos
        shell: bash
        run: |
          dart pub global activate melos ${{ env.MELOS_VERSION }}
          echo "$PUB_CACHE/bin" >> "$GITHUB_PATH"
      - run: melos bootstrap
      - name: Build example app (Android)
        run: melos run build:example:android
      - name: Enable KVM
        run: |
          sudo tee /etc/udev/rules.d/99-kvm4all.rules <<'EOF'
          KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"
          EOF
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run smoke test (Android emulator)
        timeout-minutes: 25
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          target: google_apis
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot -no-snapshot-save
          script: melos run test:example:integration:android
        env:
          ANDROID_DEVICE_ID: emulator-5554
          ANDROID_SMOKE_MAX_ATTEMPTS: "3"

  example_linux:
    runs-on: ubuntu-latest
    needs: [dart_checks, native_linux_checks]
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev xvfb
      - name: Install Melos
        shell: bash
        run: |
          dart pub global activate melos ${{ env.MELOS_VERSION }}
          echo "$PUB_CACHE/bin" >> "$GITHUB_PATH"
      - run: melos bootstrap
      - name: Build example app (Linux)
        run: melos run build:example:linux
      - name: Run smoke test (Linux)
        timeout-minutes: 15
        run: xvfb-run -a melos run test:example:integration:linux

  example_apple:
    runs-on: macos-latest
    needs: [dart_checks, native_darwin_checks]
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      # The example integrates Apple plugins via Swift Package Manager (no
      # Podfile). Enable SPM explicitly so the build is deterministic across
      # Flutter versions/defaults.
      - name: Enable Swift Package Manager
        run: flutter config --enable-swift-package-manager
      - name: Install Melos
        shell: bash
        run: |
          dart pub global activate melos ${{ env.MELOS_VERSION }}
          echo "$PUB_CACHE/bin" >> "$GITHUB_PATH"
      - run: melos bootstrap
      - name: Build example app (iOS)
        run: melos run build:example:ios
      - name: Build example app (macOS)
        run: melos run build:example:macos
      - name: Run smoke test (macOS)
        timeout-minutes: 15
        run: melos run test:example:integration:macos
      - name: Boot iOS simulator
        shell: bash
        run: |
          IOS_DEVICE_ID="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ {print $2; exit}')"
          if [[ -z "$IOS_DEVICE_ID" ]]; then
            echo "No available iPhone simulator found."
            exit 1
          fi
          echo "IOS_DEVICE_ID=$IOS_DEVICE_ID" >> "$GITHUB_ENV"
          xcrun simctl shutdown all || true
          xcrun simctl erase "$IOS_DEVICE_ID"
          xcrun simctl boot "$IOS_DEVICE_ID"
          xcrun simctl bootstatus "$IOS_DEVICE_ID" -b
          # Flutter discovers the debug VM service over the local network on
          # iOS. Pre-authorize it so a fresh CI simulator cannot block on the
          # native permission dialog before the Dart test has loaded.
          xcrun simctl privacy "$IOS_DEVICE_ID" grant local-network \
            com.invisiblewrench.fluttermidicommandExample || true
      - name: Run smoke test (iOS simulator)
        timeout-minutes: 25
        run: melos run test:example:integration:ios
        env:
          IOS_SMOKE_MAX_ATTEMPTS: "2"
          IOS_SMOKE_ATTEMPT_TIMEOUT_SECONDS: "600"
      - name: Collect iOS simulator diagnostics
        if: failure()
        shell: bash
        run: |
          xcrun simctl list
          mkdir -p "$RUNNER_TEMP/simulator-diagnostics"
          xcrun simctl diagnose -b --output="$RUNNER_TEMP/simulator-diagnostics" || true
      - name: Upload iOS simulator diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-diagnostics
          path: ${{ runner.temp }}/simulator-diagnostics
          if-no-files-found: ignore

  example_windows:
    runs-on: windows-latest
    needs: [dart_checks, native_windows_checks]
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - name: Install Melos
        shell: bash
        run: |
          dart pub global activate melos ${{ env.MELOS_VERSION }}
          echo "$PUB_CACHE/bin" >> "$GITHUB_PATH"
      - run: melos bootstrap
      - name: Build example app (Windows)
        run: melos run build:example:windows
      - name: Run smoke test (Windows)
        timeout-minutes: 15
        run: melos run test:example:integration:windows

  example_web:
    runs-on: ubuntu-latest
    needs: dart_checks
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - name: Install Melos
        shell: bash
        run: |
          dart pub global activate melos ${{ env.MELOS_VERSION }}
          echo "$PUB_CACHE/bin" >> "$GITHUB_PATH"
      - run: melos bootstrap
      - name: Build example app (Web)
        run: melos run build:example:web
      - name: Run smoke test (Web Chrome)
        timeout-minutes: 15
        run: melos run test:example:integration:web
